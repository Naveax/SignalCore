name: Final single-branch consolidation cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - .github/branch-consolidation-cleanup-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch all refs and create second verified recovery bundle
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*' --prune
          git fsck --full
          stamp="$(date -u +%Y%m%d-%H%M%S)"
          out="$RUNNER_TEMP/single-branch-cleanup-${stamp}"
          mkdir -p "$out"
          bundle="$out/SignalCore-PreCleanup-Backup-${stamp}.bundle"
          git bundle create "$bundle" --all
          git bundle verify "$bundle" > "$out/bundle-verify.txt" 2>&1
          git show-ref > "$out/show-ref-before.txt"
          git branch -r > "$out/remote-branches-before.txt"
          git log --all --decorate --oneline --graph -n 2000 > "$out/log-all-before.txt"
          printf '%s\n' "$out" > /tmp/cleanup-out

      - name: Verify branch and Git ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = main
          git diff --check
          git merge-base --is-ancestor b040e3ad25bb81d9898ca869cd6ab281591eb3eb HEAD

      - name: Compile Python sources
        run: python -m compileall -q skills/signal-core tools tests

      - name: Validate package
        run: python tools/validate.py

      - name: Run root tests
        run: python -m unittest discover -s tests -q

      - name: Run Roblox profile tests
        run: python -m unittest discover -s tests/roblox_profile -q

      - name: Validate Roblox profile
        run: python tools/validate_roblox_profile.py

      - name: Verify claims
        run: python tools/verify_claims.py

      - name: Run controlled smoke benchmark
        run: python benchmarks/roblox_profile_benchmark.py --cases 50 --mode simulated --output /tmp/roblox-profile-final-smoke.json

      - name: Verify clean worktree
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          test -z "$(git status --short)"

      - name: Record branch decisions
        shell: bash
        run: |
          set -euo pipefail
          out="$(cat /tmp/cleanup-out)"
          printf '# SignalCore branch consolidation cleanup\n\n' > "$out/cleanup-report.md"
          printf '| Branch | Tip | Classification | Reason |\n|---|---|---|---|\n' >> "$out/cleanup-report.md"
          while IFS= read -r ref; do
            branch="${ref#refs/remotes/origin/}"
            [ "$branch" = HEAD ] && continue
            tip="$(git rev-parse "$ref")"
            if [ "$branch" = main ]; then
              class=PROTECTED_MAIN; reason='retained default branch'
            elif git merge-base --is-ancestor "$ref" refs/remotes/origin/main; then
              class=MERGED_SAFE_TO_DELETE; reason='tip reachable from final main'
            elif [[ "$branch" == agent/context-os-hardening* ]]; then
              class=UNMERGED_OBSOLETE; reason='unintegrated experimental Context OS foundation; no direct tests or production references; preserved in verified bundle'
            elif [ "$branch" = agent/context-intelligence-extreme ]; then
              class=UNMERGED_OBSOLETE; reason='incomplete two-part bootstrap payload only; preserved in verified bundle'
            elif [[ "$branch" == agent/roblox-studio-orchestration-profile || "$branch" == agent/roblox-studio-profile-direct ]]; then
              class=UNMERGED_OBSOLETE; reason='failed payload/reconstruction transport superseded by merged ordinary source branch; preserved in verified bundle'
            elif [[ "$branch" == audit/branch-consolidation || "$branch" == __probe_should_not_create || "$branch" == cleanup/branch-consolidation ]]; then
              class=UNMERGED_OBSOLETE; reason='temporary audit or cleanup trigger branch; preserved in verified bundle'
            else
              class=UNMERGED_OBSOLETE; reason='historical branch reviewed and preserved in verified bundle; no required production delta identified'
            fi
            printf '| `%s` | `%s` | `%s` | %s |\n' "$branch" "$tip" "$class" "$reason" >> "$out/cleanup-report.md"
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin | sort)

      - name: Remove temporary cleanup workflow from main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/branch-consolidation-cleanup.yml
          git commit -m 'Remove temporary branch consolidation cleanup workflow'
          git push origin HEAD:main

      - name: Delete every non-main remote branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          mapfile -t branches < <(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin | grep -v '^main$' | grep -v '^HEAD$' | sort)
          for branch in "${branches[@]}"; do
            git push origin --delete "$branch"
          done
          git fetch origin --prune
          remaining="$(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin | grep -v '^HEAD$' | sort)"
          test "$remaining" = main
          out="$(cat /tmp/cleanup-out)"
          printf '%s\n' "$remaining" > "$out/remote-branches-after.txt"
          git rev-parse HEAD > "$out/final-main-sha.txt"
          git ls-remote --heads origin > "$out/ls-remote-heads-after.txt"

      - name: Upload final backup and cleanup report
        uses: actions/upload-artifact@v4
        with:
          name: signalcore-single-branch-cleanup-${{ github.run_id }}
          path: ${{ runner.temp }}/single-branch-cleanup-*/
          if-no-files-found: error
          retention-days: 90
