name: Apply Competitive Fabric Core V4

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/apply-competitive-fabric-core-v4.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - name: Materialize competitive fabric
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          stage = Path('.signalcore/materialize/v4')
          parts = [stage / f'competitive_fabric.part{index:02d}' for index in range(4)]
          content = ''.join(path.read_text(encoding='utf-8') for path in parts)
          target = Path('signalcore_runtime/competitive_fabric.py')
          target.write_text(content, encoding='utf-8')
          shutil.rmtree(Path('.signalcore/materialize'), ignore_errors=True)
          Path('.github/workflows/apply-competitive-fabric-core-v4.yml').unlink()
          PY
      - name: Regenerate manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          generated = {'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative = path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          Path('MANIFEST.sha256').write_text(''.join(f'{digest}  {name}\n' for name, digest in sorted(rows)), encoding='utf-8')
          PY
      - name: Validate implementation
        run: |
          python -m py_compile signalcore_runtime/competitive_fabric.py tests/runtime/test_competitive_fabric_v4.py
          python -m unittest tests.runtime.test_competitive_fabric_v4 -v
          python -m unittest discover -s tests/runtime -p 'test_*.py' -v
          python tools/validate.py
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "add competitive context fabric v4 core"
          git push origin HEAD:agent/adaptive-context-v04
