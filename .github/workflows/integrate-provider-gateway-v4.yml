name: Integrate Provider Gateway V4

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/integrate-provider-gateway-v4.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - name: Apply robust provider integration patch
        run: |
          python - <<'PY'
          from pathlib import Path

          mcp = Path('signalcore_runtime/mcp_server.py')
          text = mcp.read_text(encoding='utf-8')
          if 'from .provider_gateway import ProviderGateway, ProviderPlan\n' not in text:
              marker = 'from .process_broker import ProcessBroker\n'
              assert marker in text, 'provider import marker missing'
              text = text.replace(marker, marker + 'from .provider_gateway import ProviderGateway, ProviderPlan\n', 1)
          if 'self.provider_gateway = ProviderGateway(' not in text:
              marker = '        self.usage_ledger = UsageReceiptLedger(state_root / "usage-receipts.sqlite3")\n'
              assert marker in text, 'provider init marker missing'
              addition = marker + '''        self.provider_gateway = ProviderGateway(
            state_root / "provider-gateway.sqlite3",
            evidence=self.evidence,
            usage_ledger=self.usage_ledger,
        )
'''
              text = text.replace(marker, addition, 1)
          if '"signalcore.provider.prepare"' not in text:
              marker = '            tool(\n                "signalcore.fabric.profile", "Select a minimal task-conditioned MCP tool surface",\n'
              assert marker in text, 'provider tools marker missing'
              tools = '''            tool(
                "signalcore.provider.capabilities", "Inspect provider cache and usage capabilities",
                {"provider": {"type": "string"}},
            ),
            tool(
                "signalcore.provider.prepare", "Prepare a cache-stable exact provider request",
                {
                    "provider": {"type": "string"}, "request": {"type": "object"},
                    "model": {"type": "string"}, "cache_policy": {"type": "string"},
                    "replay_ttl_seconds": {"type": "integer"},
                    "prompt_cache_ttl_seconds": {"type": "integer"},
                    "explicit_cache_name": {"type": "string"},
                    "allow_tool_replay": {"type": "boolean"},
                }, ["provider", "request"],
            ),
            tool(
                "signalcore.provider.capture", "Capture an exact provider response with optional receipt and replay",
                {
                    "plan": {"type": "object"}, "response": {"type": "object"},
                    "store_replay": {"type": "boolean"},
                    "replay_ttl_seconds": {"type": "integer"},
                    "preview_bytes": {"type": "integer"}, "receipt": {"type": "object"},
                }, ["plan", "response"],
            ),
            tool(
                "signalcore.provider.replay", "Replay an exact deterministic provider response",
                {"plan": {"type": "object"}, "cache_key": {"type": "string"}},
            ),
            tool("signalcore.provider.stats", "Inspect provider gateway request and replay statistics"),
            tool("signalcore.provider.verify", "Verify provider request and response evidence integrity"),
'''
              text = text.replace(marker, tools + marker, 1)
          if 'if name == "signalcore.provider.prepare":' not in text:
              marker = '        if name == "signalcore.fabric.profile":\n'
              assert marker in text, 'provider call marker missing'
              calls = '''        if name == "signalcore.provider.capabilities":
            return self.provider_gateway.capabilities(arguments.get("provider"))
        if name == "signalcore.provider.prepare":
            return asdict(self.provider_gateway.prepare(
                str(arguments["provider"]), dict(arguments["request"]),
                model=str(arguments.get("model", "")),
                cache_policy=str(arguments.get("cache_policy", "auto")),
                replay_ttl_seconds=int(arguments.get("replay_ttl_seconds", 900)),
                prompt_cache_ttl_seconds=int(arguments.get("prompt_cache_ttl_seconds", 300)),
                explicit_cache_name=str(arguments.get("explicit_cache_name", "")),
                allow_tool_replay=bool(arguments.get("allow_tool_replay", False)),
            ))
        if name == "signalcore.provider.capture":
            return asdict(self.provider_gateway.capture(
                ProviderPlan(**dict(arguments["plan"])), dict(arguments["response"]),
                store_replay=bool(arguments.get("store_replay", True)),
                replay_ttl_seconds=int(arguments.get("replay_ttl_seconds", 900)),
                preview_bytes=int(arguments.get("preview_bytes", 4096)),
                receipt=arguments.get("receipt"),
            ))
        if name == "signalcore.provider.replay":
            target = ProviderPlan(**dict(arguments["plan"])) if arguments.get("plan") else str(arguments.get("cache_key", ""))
            return self.provider_gateway.replay(target)
        if name == "signalcore.provider.stats":
            return self.provider_gateway.stats()
        if name == "signalcore.provider.verify":
            return self.provider_gateway.verify()
'''
              text = text.replace(marker, calls + marker, 1)
          mcp.write_text(text, encoding='utf-8')

          fabric = Path('signalcore_runtime/competitive_fabric.py')
          text = fabric.read_text(encoding='utf-8')
          if '"signalcore.provider.prepare"' not in text:
              marker = '            "signalcore.fabric.insights", "signalcore.fabric.platform_plan",\n'
              assert marker in text, 'optimized profile marker missing'
              addition = marker + '''            "signalcore.provider.capabilities", "signalcore.provider.prepare",
            "signalcore.provider.capture", "signalcore.provider.replay",
            "signalcore.provider.stats", "signalcore.provider.verify",
'''
              text = text.replace(marker, addition, 1)
          if 'model api|openai|anthropic' not in text:
              marker = '    (re.compile(r"(?i)\\b(token|context|cache|profile|manifest|compression)\\b"),\n     ("signalcore.compress", "signalcore.expand", "signalcore.context.evaluate", "signalcore.fabric.profile", "signalcore.fabric.cache_align")),\n'
              assert marker in text, 'provider intent marker missing'
              addition = marker + '    (re.compile(r"(?i)\\b(provider|model api|openai|anthropic|claude|gemini|prompt cache|usage receipt|llm gateway)\\b"),\n     ("signalcore.provider.capabilities", "signalcore.provider.prepare", "signalcore.provider.capture", "signalcore.provider.replay", "signalcore.provider.verify")),\n'
              text = text.replace(marker, addition, 1)
          marker = '            selected.extend(name for name in available if name.startswith("signalcore.fabric.") and name not in selected)\n'
          if marker in text:
              replacement = '''            selected.extend(
                name for name in available
                if name.startswith(("signalcore.fabric.", "signalcore.provider.")) and name not in selected
            )
'''
              text = text.replace(marker, replacement, 1)
          fabric.write_text(text, encoding='utf-8')
          PY
      - name: Run provider and complete runtime tests
        id: tests
        continue-on-error: true
        run: |
          set +e
          {
            python -m py_compile signalcore_runtime/provider_gateway.py signalcore_runtime/mcp_server.py signalcore_runtime/competitive_fabric.py
            python -m unittest tests.runtime.test_provider_gateway_v4 -v
            python -m unittest tests.runtime.test_provider_mcp_v4 -v
            python -m unittest tests.runtime.test_competitive_mcp_v4 -v
            python -m unittest discover -s tests/runtime -p 'test_*.py' -v
            python tools/validate.py
          } > /tmp/provider-v4-tests.log 2>&1
          status=$?
          cat /tmp/provider-v4-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Finalize success or diagnostic failure
        run: |
          status='${{ steps.tests.outputs.status }}'
          rm .github/workflows/integrate-provider-gateway-v4.yml
          if [ "$status" != "0" ]; then
            git checkout -- signalcore_runtime/mcp_server.py signalcore_runtime/competitive_fabric.py
            mkdir -p diagnostics
            cp /tmp/provider-v4-tests.log diagnostics/provider-gateway-v4-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "record provider gateway v4 integration failure"
            git push origin HEAD:agent/adaptive-context-v04
            exit 0
          fi
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          generated = {'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative = path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          Path('MANIFEST.sha256').write_text(
              ''.join(f'{digest}  {name}\n' for name, digest in sorted(rows)), encoding='utf-8'
          )
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "integrate provider gateway into competitive fabric"
          git push origin HEAD:agent/adaptive-context-v04
