name: Finalize Product Parity V5

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile product parity source
        run: python -m compileall -q signalcore_runtime tests benchmarks
      - name: Validate TypeScript distribution
        run: node --check sdk/typescript/dist/index.js
      - name: Run focused product parity tests
        run: python -m unittest tests.runtime.test_product_parity_v5 -v
      - name: Generate product parity benchmark
        run: python benchmarks/product_parity_v5_benchmark.py
      - name: Run complete test discovery
        run: python -m unittest discover -s tests -q
      - name: Generate final manifest without the one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          mv .github/workflows/product-parity-v5-finalize.yml /tmp/product-parity-v5-finalize.yml
          python - <<'PY'
          import hashlib
          from pathlib import Path
          from tools.validate import ROOT, _manifest_candidates

          rows = []
          for path in _manifest_candidates():
              relative = path.relative_to(ROOT).as_posix()
              rows.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {relative}")
          (ROOT / "MANIFEST.sha256").write_text("\n".join(rows) + "\n", encoding="utf-8", newline="\n")
          PY
          python tools/validate.py
          mv /tmp/product-parity-v5-finalize.yml .github/workflows/product-parity-v5-finalize.yml
      - name: Commit generated benchmark and manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add MANIFEST.sha256 benchmarks/results/product-parity-v5/internal.json
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit -m 'Finalize product parity V5 evidence'
            git push origin HEAD:${{ github.head_ref }}
          fi
