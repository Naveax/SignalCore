name: Final Single Branch Cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/single-branch-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signalcore-final-single-branch-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete every remote branch except main
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t branches < <(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | sort -u)
          for branch in "${branches[@]}"; do
            if [[ "$branch" == "main" ]]; then
              continue
            fi
            echo "Deleting remote branch: $branch"
            git push origin --delete "$branch"
          done
          mapfile -t remaining < <(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | sort -u)
          printf 'Remaining branches:\n%s\n' "${remaining[*]}"
          test "${#remaining[@]}" -eq 1
          test "${remaining[0]}" = "main"
      - name: Remove cleanup workflow from main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/single-branch-cleanup.yml
          git commit -m "Remove final single-branch cleanup workflow"
          git push origin HEAD:main
