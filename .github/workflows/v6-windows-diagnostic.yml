name: V6 Windows Diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v6-windows-diag
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check -e .

      - name: Capture runtime test output
        id: runtime
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -m unittest discover -s tests/runtime -q *>&1 | Tee-Object -FilePath windows-runtime.log
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v6-windows-runtime-${{ github.sha }}
          path: windows-runtime.log
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Enforce runtime result
        shell: pwsh
        run: |
          if ("${{ steps.runtime.outputs.exit_code }}" -ne "0") {
            exit 1
          }
