name: Finalize Competitive Fabric V4

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/finalize-competitive-v4.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - name: Remove probes and restore production package init
        shell: bash
        run: |
          rm -f sitecustomize.py benchmarks/sitecustomize.py
          rm -f .github/workflows/integrate-provider-gateway-v4.yml
          rm -f .github/workflows/finalize-competitive-v4.yml
          cat > signalcore_runtime/__init__.py <<'PY'
          """SignalCore 0.3.0 unified local-first runtime control plane."""

          __version__ = "0.3.0"

          # Keep the core MCP implementation stable; provider support is installed as an
          # idempotent extension so existing tools and profiles retain their behavior.
          from .provider_mcp_extension import install as _install_provider_mcp_extension

          _install_provider_mcp_extension()
          del _install_provider_mcp_extension
          PY
      - name: Regenerate exact package manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path('.')
          generated = {
              'fusion-release-smoke.json',
              'release-smoke.json',
              'platform-registry.json',
              'native-dry-run.json',
          }
          rows = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative = path.relative_to(root)
              if any(part in {'.git', '.signalcore', '__pycache__', '.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          Path('MANIFEST.sha256').write_text(
              ''.join(f'{digest}  {name}\n' for name, digest in sorted(rows)),
              encoding='utf-8',
          )
          PY
      - name: Validate provider gateway and competitive runtime
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONWARNINGS: "error::ResourceWarning"
        run: |
          python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
          python -m unittest tests.runtime.test_provider_gateway_v4 -v
          python -m unittest tests.runtime.test_provider_mcp_v4 -v
          python -m unittest tests.runtime.test_competitive_fabric_v4 -v
          python -m unittest tests.runtime.test_competitive_hook_v4 -v
          python -m unittest tests.runtime.test_competitive_mcp_v4 -v
          python -m unittest discover -s tests/runtime -p 'test_*.py' -v
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -v
          python tools/validate_runtime.py
          python tools/validate.py
          python tools/validate_release.py --profile 5x --smoke --output release-smoke.json
      - name: Commit clean validated state
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "finalize competitive context fabric v4"
          git push origin HEAD:agent/adaptive-context-v04
