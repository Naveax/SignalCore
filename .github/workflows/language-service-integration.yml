name: Syntavra Language Service Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-language-service-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate hash-pinned language services
        run: |
          python - <<'PY'
          from pathlib import Path

          def patch(path_value: str, changes: tuple[tuple[str, str, str], ...]) -> None:
              path = Path(path_value)
              source = path.read_text(encoding="utf-8")
              for old, new, label in changes:
                  count = source.count(old)
                  if count != 1:
                      raise SystemExit(f"{path}:{label}: expected one anchor, found {count}")
                  source = source.replace(old, new, 1)
              path.write_text(source, encoding="utf-8")

          patch(
              "syntavra_runtime/language_services.py",
              (
                  ("import hashlib\nimport json\n", "import hashlib\nimport hmac\nimport json\n", "hmac import"),
                  ("if not hashlib.compare_digest(actual, self.manifest.executable_sha256):", "if not hmac.compare_digest(actual, self.manifest.executable_sha256):", "constant-time digest"),
              ),
          )

          patch(
              "syntavra_runtime/language_platform.py",
              (
                  (
                      'LanguageDescriptor("cpp", (".cc", ".cpp", ".cxx", ".hh", ".hpp", ".hxx", ".ixx", ".mpp")),',
                      'LanguageDescriptor("cpp", (".cc", ".cpp", ".cxx", ".h", ".hh", ".hpp", ".hxx", ".ixx", ".mpp")),',
                      "c cpp header ambiguity",
                  ),
                  (
                      'LanguageDescriptor("matlab", (".matlab",), filenames=("contents.m",)),\n    LanguageDescriptor("octave", (".octave",), shebangs=("octave",)),',
                      'LanguageDescriptor("matlab", (".m", ".matlab"), filenames=("contents.m",)),\n    LanguageDescriptor("octave", (".m", ".octave"), shebangs=("octave",)),',
                      "m language ambiguity",
                  ),
              ),
          )

          patch(
              "syntavra_runtime/semantic_intelligence.py",
              (
                  (
                      'from .language_platform import LanguageDetection, LanguageParseResult, LanguageRegistry\n',
                      'from .language_platform import LanguageDetection, LanguageParseResult, LanguageRegistry\nfrom .language_services import LanguageServiceRegistry, SandboxedLanguageServiceAdapter\n',
                      "service import",
                  ),
                  (
                      '''    def __init__(self, path: Path, *, language_registry: LanguageRegistry | None = None):\n        self.path = path\n        self.languages = language_registry or LanguageRegistry()\n''',
                      '''    def __init__(\n        self,\n        path: Path,\n        *,\n        language_registry: LanguageRegistry | None = None,\n        language_service_registry: LanguageServiceRegistry | None = None,\n    ):\n        self.path = path\n        self.languages = language_registry or LanguageRegistry()\n        self.language_services = language_service_registry or LanguageServiceRegistry()\n''',
                      "service registry",
                  ),
                  (
                      '''    def _adapter_parse(\n        self,\n        relative: str,\n        text: str,\n        language: str,\n        evidence: str,\n        detection: LanguageDetection,\n    ) -> tuple[list[dict[str, Any]], list[dict[str, Any]], list[str]] | None:\n        adapter = self.languages.adapter_for(language)\n        if adapter is None:\n            return None\n''',
                      '''    def _adapter_for_detection(self, detection: LanguageDetection) -> Any | None:\n        direct = self.languages.adapter_for(detection.language_id)\n        if direct is not None:\n            return direct\n        candidates = []\n        seen: set[int] = set()\n        for language_id in detection.candidates:\n            adapter = self.languages.adapter_for(language_id)\n            if adapter is not None and id(adapter) not in seen:\n                seen.add(id(adapter))\n                candidates.append(adapter)\n        return candidates[0] if len(candidates) == 1 else None\n\n    def _adapter_parse(\n        self,\n        relative: str,\n        text: str,\n        language: str,\n        evidence: str,\n        detection: LanguageDetection,\n    ) -> tuple[list[dict[str, Any]], list[dict[str, Any]], list[str]] | None:\n        adapter = self._adapter_for_detection(detection)\n        if adapter is None:\n            return None\n        adapter_languages = tuple(str(item).casefold() for item in adapter.language_ids)\n        resolved_language = next((item for item in detection.candidates if item.casefold() in adapter_languages), language)\n''',
                      "adapter resolution",
                  ),
                  (
                      '                "language": language,\n                "evidence_ref": str(item.get("evidence_ref") or evidence),',
                      '                "language": resolved_language,\n                "evidence_ref": str(item.get("evidence_ref") or evidence),',
                      "adapter node language",
                  ),
                  (
                      '''        adapter_identity = "none" if adapter is None else f"{type(adapter).__module__}.{type(adapter).__qualname__}"\n        payload = json.dumps(\n''',
                      '''        adapter_identity = "none" if adapter is None else f"{type(adapter).__module__}.{type(adapter).__qualname__}"\n        adapter_manifest_hash = str(getattr(getattr(adapter, "manifest", None), "manifest_hash", ""))\n        payload = json.dumps(\n''',
                      "adapter manifest identity",
                  ),
                  (
                      '                "adapter": adapter_identity,\n',
                      '                "adapter": adapter_identity,\n                "adapter_manifest_sha256": adapter_manifest_hash,\n',
                      "analysis manifest hash",
                  ),
                  (
                      '''        root = root.resolve(strict=True)\n        self.languages.discover_manifests(root)\n        changed = 0\n''',
                      '''        root = root.resolve(strict=True)\n        self.languages.discover_manifests(root)\n        self.language_services.discover(root)\n        service_diagnostics: list[str] = list(self.language_services.diagnostics)\n        if os.environ.get("SYNTAVRA_ALLOW_LANGUAGE_SERVICES", "").casefold() in {"1", "true", "yes"}:\n            for manifest in sorted(self.language_services.manifests.values(), key=lambda item: item.service_id):\n                try:\n                    adapter = SandboxedLanguageServiceAdapter(\n                        manifest,\n                        workspace=root,\n                        state_root=self.path.parent / "language-service-state",\n                    )\n                    self.languages.register_adapter(adapter)\n                except Exception as error:\n                    service_diagnostics.append(f"service:{manifest.service_id}: {type(error).__name__}: {error}")\n        changed = 0\n''',
                      "service discovery",
                  ),
                  (
                      '                adapter = self.languages.adapter_for(detection.language_id)\n                analysis_key = self._analysis_key(digest, detection, adapter)\n',
                      '                adapter = self._adapter_for_detection(detection)\n                analysis_key = self._analysis_key(digest, detection, adapter)\n',
                      "analysis adapter",
                  ),
                  (
                      '''            "warnings": warnings,\n            "language_platform": self.languages.inventory(),\n            **self.stats(),\n''',
                      '''            "warnings": warnings,\n            "language_platform": self.languages.inventory(),\n            "language_services": {\n                **self.language_services.inventory(),\n                "diagnostics": service_diagnostics,\n            },\n            **self.stats(),\n''',
                      "service inventory",
                  ),
              ),
          )
          PY

      - name: Validate syntax and focused service tests
        run: |
          python -m compileall -q syntavra_runtime/language_platform.py syntavra_runtime/language_services.py syntavra_runtime/semantic_intelligence.py
          python -m unittest tests.runtime.test_language_platform tests.runtime.test_language_ambiguity_security tests.runtime.test_language_services

      - name: Commit language service integration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/language_platform.py syntavra_runtime/language_services.py syntavra_runtime/semantic_intelligence.py; then
            echo "No language service changes required."
            exit 0
          fi
          git config user.name "syntavra-language-bot"
          git config user.email "syntavra-language-bot@users.noreply.github.com"
          git add syntavra_runtime/language_platform.py syntavra_runtime/language_services.py syntavra_runtime/semantic_intelligence.py
          git commit -m "integrate sandboxed universal language services"
          git push origin "HEAD:${HEAD_BRANCH}"
