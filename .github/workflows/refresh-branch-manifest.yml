name: Prepare Syntavra Branch Manifest

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "agent/**"
      - "fix/**"
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-branch-manifest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Rebuild committed TypeScript SDK output
        working-directory: sdk/typescript
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check
          npm test
          node --check dist/index.js
      - name: Refresh Roblox profile integrity manifest
        shell: python
        run: |
          import hashlib
          from pathlib import Path
          profile=Path('skills/syntavra/profiles/roblox_studio')
          manifest=profile/'MANIFEST.sha256'
          rows=[]
          for path in sorted(profile.rglob('*'), key=lambda item: item.relative_to(profile).as_posix()):
              if not path.is_file() or path == manifest or '__pycache__' in path.parts:
                  continue
              rows.append(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.relative_to(profile).as_posix()}")
          manifest.write_text('\n'.join(rows) + '\n', encoding='utf-8', newline='\n')
      - name: Validate regenerated profile
        run: python tools/validate_roblox_profile.py
      - name: Generate deterministic root SHA-256 manifest
        run: python tools/refresh_manifest.py
      - name: Materialize prepared integrity tree
        id: prepared
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          allowed='^(MANIFEST\.sha256|sdk/typescript/dist/(index\.js|index\.d\.ts|receipts\.js|receipts\.d\.ts)|skills/syntavra/profiles/roblox_studio/MANIFEST\.sha256)$'
          changed="$(git diff --name-only)"
          if [ -n "$changed" ]; then
            while IFS= read -r path; do
              echo "$path" | grep -Eq "$allowed" || { echo "unexpected generated change: $path"; exit 1; }
            done <<< "$changed"
            git add -- MANIFEST.sha256 sdk/typescript/dist skills/syntavra/profiles/roblox_studio/MANIFEST.sha256
            git commit -m "prepare Syntavra generated integrity outputs"
            temporary_branch="prepared-manifest/${GITHUB_SHA}"
            git push --force origin "HEAD:refs/heads/${temporary_branch}"
            printf '%s\n' "$temporary_branch" > prepared-branch.txt
          else
            printf '%s\n' "" > prepared-branch.txt
          fi
          git rev-parse 'HEAD^{tree}' > prepared-tree.txt
          git rev-parse HEAD > prepared-commit.txt
          cp MANIFEST.sha256 prepared-MANIFEST.sha256
      - name: Upload prepared integrity tree metadata
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-prepared-manifest-tree-${{ github.sha }}
          path: |
            prepared-MANIFEST.sha256
            prepared-tree.txt
            prepared-commit.txt
            prepared-branch.txt
          if-no-files-found: error
          retention-days: 7
