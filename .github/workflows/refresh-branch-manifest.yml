name: Prepare Syntavra Branch Manifest

on:
  push:
    branches:
      - "agent/**"
      - "fix/**"
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syntavra-branch-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.ref_name != 'main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate deterministic SHA-256 manifest
        run: python tools/refresh_manifest.py
      - name: Upload prepared manifest
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-branch-manifest-${{ github.sha }}
          path: MANIFEST.sha256
          if-no-files-found: error
          retention-days: 7
