name: Materialize clean SignalCore sovereign runtime

on:
  push:
    branches:
      - fix/sovereign-runtime-materialized
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-clean-sovereign-runtime
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize ordinary source files
        shell: bash
        run: |
          set -euo pipefail
          for part in .github/materialize/part-*.py; do
            python "$part"
          done

      - name: Validate source before commit
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q skills/signal-core/profiles/roblox_studio tests/roblox_profile tools benchmarks
          python -m unittest discover -s tests/roblox_profile -q
          SIGNALCORE_ALLOW_WORKTREE=1 python tools/validate_roblox_profile.py

      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/materialize .github/workflows/materialize-clean-sovereign-runtime.yml
          git commit -m "core: materialize sovereign Roblox runtime"
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Generate traceable claims and artifacts
        shell: bash
        run: |
          set -euo pipefail
          python tools/run_roblox_tests.py --source-commit "$SOURCE_COMMIT" --output benchmarks/results/roblox-profile/profile-tests.json
          python benchmarks/roblox_profile_benchmark.py --cases 50 --mode simulated --source-commit "$SOURCE_COMMIT" --output benchmarks/results/roblox-profile/simulated-50.json
          python .github/materialize/metadata.py
          python tools/verify_claims.py
          python tools/validate_roblox_profile.py

      - name: Remove bootstrap and publish ordinary tree
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .github/materialize
          git rm .github/workflows/materialize-clean-sovereign-runtime.yml
          git add README.md docs/claims benchmarks/results/roblox-profile
          git commit -m "docs: publish traceable Roblox profile claims"
          git push origin HEAD:fix/sovereign-runtime-materialized
