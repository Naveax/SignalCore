name: Syntavra Universal Language CLI Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-language-cli-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate universal language facade and CLI
        run: |
          python - <<'PY'
          from pathlib import Path

          def patch(path_value: str, changes: tuple[tuple[str, str, str], ...]) -> None:
              path = Path(path_value)
              source = path.read_text(encoding="utf-8")
              for old, new, label in changes:
                  count = source.count(old)
                  if count != 1:
                      raise SystemExit(f"{path}:{label}: expected one anchor, found {count}")
                  source = source.replace(old, new, 1)
              path.write_text(source, encoding="utf-8")

          patch(
              "syntavra_runtime/semantic_intelligence.py",
              (
                  (
                      '''    def import_semantic_index(\n        self,\n''',
                      '''    def language_status(self, repository_root: Path | None = None) -> dict[str, Any]:\n        if repository_root is not None:\n            root = repository_root.resolve(strict=True)\n            self.languages.discover_manifests(root)\n            self.language_services.discover(root)\n            self.lsp_services.discover(root)\n        language_inventory = self.languages.inventory()\n        analyzer_inventory = self.language_services.inventory()\n        lsp_inventory = self.lsp_services.inventory()\n        index_inventory = self.semantic_indexes.stats()\n        return {\n            "ok": True,\n            "universal_text_fallback": True,\n            "language_registry": language_inventory,\n            "sandboxed_analyzers": analyzer_inventory,\n            "lsp_services": lsp_inventory,\n            "semantic_indexes": index_inventory,\n            "evidence_levels": ["lexical", "syntax", "semantic"],\n            "claim_boundary": (\n                "unknown and future text languages remain navigable; exact type, call, implementation and override "\n                "claims require validated parser, analyzer, LSP, LSIF or SCIP evidence"\n            ),\n        }\n\n    def import_semantic_index(\n        self,\n''',
                      "language status API",
                  ),
              ),
          )

          patch(
              "syntavra_runtime/platform.py",
              (
                  (
                      'from .semantic_services import LanguageServiceRegistry, SemanticIndexImporter\n',
                      '',
                      "remove legacy semantic registry import",
                  ),
                  (
                      '''        self.runtime_evidence = RuntimeEvidenceGraph(self.state_root / "runtime-evidence.sqlite3")\n        self.language_services = LanguageServiceRegistry()\n        self.semantic_importer = SemanticIndexImporter(self.runtime_evidence)\n''',
                      '''        self.runtime_evidence = RuntimeEvidenceGraph(self.state_root / "runtime-evidence.sqlite3")\n''',
                      "remove legacy runtime services",
                  ),
                  (
                      '''            "runtime_evidence": self.runtime_evidence.stats(),\n            "language_services": self.language_services.status(),\n''',
                      '''            "runtime_evidence": self.runtime_evidence.stats(),\n            "language_platform": self.graph.language_status(self.project),\n''',
                      "status language platform",
                  ),
                  (
                      '''                "incremental_semantic_graph": True,\n                "lsp_scip_lsif_services": True,\n''',
                      '''                "incremental_semantic_graph": True,\n                "universal_future_language_fallback": True,\n                "sandboxed_language_analyzers": True,\n                "generic_hash_pinned_lsp": True,\n                "atomic_lsif_scip_import": True,\n''',
                      "capability details",
                  ),
                  (
                      '''        language_services = self.language_services.status()\n        return {\n''',
                      '''        language_platform = self.graph.language_status(self.project)\n        return {\n''',
                      "doctor language platform local",
                  ),
                  (
                      '''            "language_services": language_services,\n''',
                      '''            "language_platform": language_platform,\n''',
                      "doctor language platform field",
                  ),
                  (
                      '''            "semantic-intelligence",\n            "runtime-evidence",\n            "language-services",\n''',
                      '''            "semantic-intelligence",\n            "runtime-evidence",\n            "universal-language-platform",\n            "sandboxed-language-services",\n            "generic-lsp-bridge",\n            "semantic-index-import",\n''',
                      "manifest language components",
                  ),
                  (
                      '''    "LanguageServiceRegistry",\n''',
                      '',
                      "remove legacy registry export",
                  ),
                  (
                      '''    "SemanticIndexImporter",\n''',
                      '',
                      "remove legacy importer export",
                  ),
              ),
          )

          patch(
              "syntavra_runtime/platform_cli.py",
              (
                  (
                      '''    "graph-index", "graph-query", "graph-impact",\n    "semantic-services", "semantic-import", "evidence-stats", "evidence-neighbors",\n''',
                      '''    "graph-index", "graph-query", "graph-impact", "language",\n    "semantic-services", "semantic-import", "evidence-stats", "evidence-neighbors",\n''',
                      "language action",
                  ),
                  (
                      '''    graph_impact = run_sub.add_parser("graph-impact")\n    graph_impact.add_argument("node_id")\n    graph_impact.add_argument("--max-depth", type=int, default=6)\n    run_sub.add_parser("semantic-services")\n''',
                      '''    graph_impact = run_sub.add_parser("graph-impact")\n    graph_impact.add_argument("node_id")\n    graph_impact.add_argument("--max-depth", type=int, default=6)\n\n    language = run_sub.add_parser("language")\n    language_sub = language.add_subparsers(dest="language_action", required=True)\n    language_sub.add_parser("inventory")\n    language_detect = language_sub.add_parser("detect")\n    language_detect.add_argument("path")\n    language_index = language_sub.add_parser("index")\n    language_index.add_argument("--max-file-bytes", type=int, default=2_000_000)\n    language_query = language_sub.add_parser("query")\n    language_query.add_argument("query")\n    language_query.add_argument("--limit", type=int, default=20)\n    language_import = language_sub.add_parser("import-index")\n    language_import.add_argument("path")\n    language_import.add_argument("--format", choices=("auto", "lsif", "scip-json"), default="auto")\n    language_import.add_argument("--repository-commit")\n    language_import.add_argument("--current-commit")\n    language_import.add_argument("--allow-stale", action="store_true")\n    language_import.add_argument("--source-name")\n    language_remove = language_sub.add_parser("remove-index")\n    language_remove.add_argument("source_key")\n    language_sub.add_parser("doctor")\n\n    run_sub.add_parser("semantic-services")\n''',
                      "language parser",
                  ),
                  (
                      '''    semantic_import.add_argument("--repository-commit", default="unknown")\n    semantic_import.add_argument("--test-id", default="coverage-suite")\n''',
                      '''    semantic_import.add_argument("--repository-commit")\n    semantic_import.add_argument("--allow-stale", action="store_true")\n    semantic_import.add_argument("--test-id", default="coverage-suite")\n''',
                      "compat semantic import freshness",
                  ),
                  (
                      '''    if action == "graph-impact":\n        return runtime.graph.impact(args.node_id, max_depth=args.max_depth)\n    if action == "semantic-services":\n        return runtime.language_services.status()\n    if action == "semantic-import":\n        source = _project_path(project, args.path)\n        if args.format == "lsif":\n            return runtime.semantic_importer.import_lsif(source, repository_commit=args.repository_commit)\n        if args.format == "scip-json":\n            return runtime.semantic_importer.import_scip_json(source, repository_commit=args.repository_commit)\n''',
                      '''    if action == "graph-impact":\n        return runtime.graph.impact(args.node_id, max_depth=args.max_depth)\n    if action == "language":\n        operation = args.language_action\n        if operation in {"inventory", "doctor"}:\n            return runtime.graph.language_status(project)\n        if operation == "detect":\n            source = _project_path(project, args.path).resolve(strict=True)\n            try:\n                source.relative_to(project.resolve(strict=True))\n            except ValueError as error:\n                raise PermissionError("language detection path escapes project") from error\n            if not source.is_file():\n                raise ValueError("language detection path must be a file")\n            detection = runtime.graph.languages.detect(source, source.read_bytes())\n            return {"ok": True, "path": source.relative_to(project).as_posix(), "detection": asdict(detection)}\n        if operation == "index":\n            return runtime.graph.index_repository(project, max_file_bytes=args.max_file_bytes)\n        if operation == "query":\n            return {"ok": True, "query": args.query, "results": runtime.graph.query(args.query, limit=args.limit)}\n        if operation == "import-index":\n            return runtime.graph.import_semantic_index(\n                _project_path(project, args.path).resolve(strict=True),\n                repository_root=project,\n                format=args.format,\n                repository_commit=args.repository_commit,\n                current_commit=args.current_commit,\n                allow_stale=args.allow_stale,\n                source_name=args.source_name,\n            )\n        if operation == "remove-index":\n            return runtime.graph.remove_semantic_index(args.source_key)\n        raise RuntimeError(operation)\n    if action == "semantic-services":\n        return runtime.graph.language_status(project)\n    if action == "semantic-import":\n        source = _project_path(project, args.path)\n        if args.format in {"lsif", "scip-json"}:\n            return runtime.graph.import_semantic_index(\n                source.resolve(strict=True),\n                repository_root=project,\n                format=args.format,\n                repository_commit=args.repository_commit,\n                allow_stale=args.allow_stale,\n            )\n''',
                      "language CLI handler",
                  ),
              ),
          )
          PY

      - name: Validate universal language CLI and facade
        run: |
          python -m compileall -q syntavra_runtime/semantic_intelligence.py syntavra_runtime/platform.py syntavra_runtime/platform_cli.py
          python -m unittest tests.runtime.test_language_platform tests.runtime.test_language_ambiguity_security tests.runtime.test_language_services tests.runtime.test_language_lsp tests.runtime.test_semantic_indexes tests.runtime.test_semantic_index_store
          python -m syntavra_runtime --project . run language inventory > language-inventory.json
          python - <<'PY'
          import json
          value = json.load(open("language-inventory.json", encoding="utf-8"))
          assert value["ok"] is True
          assert value["universal_text_fallback"] is True
          assert value["language_registry"]["registered_languages"] > 50
          PY

      - name: Commit universal language CLI integration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/semantic_intelligence.py syntavra_runtime/platform.py syntavra_runtime/platform_cli.py; then
            echo "No universal language CLI changes required."
            exit 0
          fi
          git config user.name "syntavra-language-bot"
          git config user.email "syntavra-language-bot@users.noreply.github.com"
          git add syntavra_runtime/semantic_intelligence.py syntavra_runtime/platform.py syntavra_runtime/platform_cli.py
          git commit -m "expose universal language platform through canonical CLI"
          git push origin "HEAD:${HEAD_BRANCH}"
