name: Delete merged feature branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete merged branch
        shell: bash
        run: git push origin --delete agent/adaptive-context-v04
