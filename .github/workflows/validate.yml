name: Diagnose Strict Long Session Budget V4

on:
  push:
    branches:
      - agent/ecosystem-long-session-v04
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ecosystem-long-session-v4
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ecosystem-long-session-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture focused and benchmark diagnostics
        shell: bash
        run: |
          set +e
          : > strict-budget-v4-diagnostic.txt
          python -m compileall -q signalcore_runtime benchmarks tests >> strict-budget-v4-diagnostic.txt 2>&1
          compile_status=$?
          echo "COMPILE_STATUS=$compile_status" >> strict-budget-v4-diagnostic.txt
          python -m unittest discover -s tests/runtime -p 'test_*v4.py' -v >> strict-budget-v4-diagnostic.txt 2>&1
          test_status=$?
          echo "TEST_STATUS=$test_status" >> strict-budget-v4-diagnostic.txt
          mkdir -p benchmarks/results/long-session-v4
          python benchmarks/long_session_v4_benchmark.py \
            --events 2048 \
            --token-budget 4096 \
            --output benchmarks/results/long-session-v4/internal.json \
            >> strict-budget-v4-diagnostic.txt 2>&1
          bench_status=$?
          echo "BENCH_STATUS=$bench_status" >> strict-budget-v4-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add strict-budget-v4-diagnostic.txt
          git commit -m "record strict long-session budget diagnostics"
          git push origin HEAD:agent/ecosystem-long-session-v04
          if [ "$compile_status" -ne 0 ] || [ "$test_status" -ne 0 ] || [ "$bench_status" -ne 0 ]; then
            exit 1
          fi
