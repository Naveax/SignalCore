name: Validate Syntavra Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime and test dependencies
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Compile canonical and compatibility packages
        run: python -m compileall -q syntavra_runtime signalcore_runtime skills/syntavra/scripts tools tests benchmarks
      - name: Validate package and locked identity
        run: |
          python tools/validate.py
          python -m syntavra_runtime version
          python -m syntavra_runtime run platform-manifest
      - name: Run complete test suite
        run: python -m pytest tests -q
      - name: Check platform registry
        run: python tools/install.py list --output platform-registry.json
      - name: Dry-run native adapters
        run: python tools/install.py install --platforms all-native --scope project --project . --dry-run --output native-dry-run.json
