name: Validate SignalCore Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q signalcore_runtime skills/signal-core/scripts tools tests benchmarks
      - name: Validate package
        run: python tools/validate.py
      - name: Run complete test discovery
        run: python -m unittest discover -s tests -q
      - name: Check platform registry
        run: python tools/install.py list --output platform-registry.json
      - name: Dry-run native adapters
        run: python tools/install.py install --platforms all-native --scope project --project . --dry-run --output native-dry-run.json

  repair-canonical-manifest:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/adaptive-context-v04'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bind manifest to canonical workflow
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          python - <<'PY'
          from pathlib import Path
          import hashlib
          manifest = Path('MANIFEST.sha256')
          target = '.github/workflows/validate.yml'
          digest = hashlib.sha256(Path(target).read_bytes()).hexdigest()
          rows = []
          found = False
          for line in manifest.read_text(encoding='utf-8').splitlines():
              if line.endswith('  ' + target):
                  rows.append(f'{digest}  {target}')
                  found = True
              else:
                  rows.append(line)
          if not found:
              raise SystemExit('validate.yml entry missing from manifest')
          manifest.write_text('\n'.join(rows) + '\n', encoding='utf-8', newline='\n')
          PY
          python tools/validate.py
      - name: Commit corrected manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add MANIFEST.sha256
          git commit -m "bind manifest to canonical package workflow"
          git push origin HEAD:agent/adaptive-context-v04
