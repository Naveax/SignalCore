name: Syntavra Semantic Index Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-semantic-index-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate semantic index ownership and graph API
        run: |
          python - <<'PY'
          from pathlib import Path

          def patch(path_value: str, changes: tuple[tuple[str, str, str], ...]) -> None:
              path = Path(path_value)
              source = path.read_text(encoding="utf-8")
              for old, new, label in changes:
                  count = source.count(old)
                  if count != 1:
                      raise SystemExit(f"{path}:{label}: expected one anchor, found {count}")
                  source = source.replace(old, new, 1)
              path.write_text(source, encoding="utf-8")

          patch(
              "syntavra_runtime/semantic_index_store.py",
              (
                  (
                      '''        with _connect(self.database_path) as db:\n            self._remove_owned_rows(db, key)\n            db.execute(\n''',
                      '''        with _connect(self.database_path) as db:\n            for node_id in node_ids:\n                exists = db.execute("SELECT 1 FROM nodes WHERE node_id = ?", (node_id,)).fetchone()\n                if not exists:\n                    continue\n                owned_by_current = db.execute(\n                    "SELECT 1 FROM semantic_source_nodes WHERE source_key = ? AND node_id = ?",\n                    (key, node_id),\n                ).fetchone()\n                owned_by_other = db.execute(\n                    "SELECT 1 FROM semantic_source_nodes WHERE source_key != ? AND node_id = ? LIMIT 1",\n                    (key, node_id),\n                ).fetchone()\n                if not owned_by_current or owned_by_other:\n                    raise ValueError(f"semantic index node id collision: {node_id}")\n            self._remove_owned_rows(db, key)\n            db.execute(\n''',
                      "node collision guard",
                  ),
              ),
          )

          patch(
              "syntavra_runtime/semantic_intelligence.py",
              (
                  (
                      'from .language_lsp import GenericLSPAdapter, LSPServiceRegistry\n',
                      'from .language_lsp import GenericLSPAdapter, LSPServiceRegistry\nfrom .semantic_index_store import SemanticIndexStore\n',
                      "semantic index store import",
                  ),
                  (
                      '''            for column, statement in migrations.items():\n                if column not in existing:\n                    db.execute(statement)\n\n    @staticmethod\n''',
                      '''            for column, statement in migrations.items():\n                if column not in existing:\n                    db.execute(statement)\n        self.semantic_indexes = SemanticIndexStore(path)\n\n    @staticmethod\n''',
                      "semantic index store initialization",
                  ),
                  (
                      '''    def query(self, text: str, *, limit: int = 20) -> list[dict[str, Any]]:\n''',
                      '''    def import_semantic_index(\n        self,\n        index_path: Path,\n        *,\n        repository_root: Path,\n        format: str = "auto",\n        repository_commit: str | None = None,\n        current_commit: str | None = None,\n        allow_stale: bool = False,\n        source_name: str | None = None,\n    ) -> dict[str, Any]:\n        return self.semantic_indexes.import_path(\n            index_path,\n            repository_root=repository_root,\n            format=format,\n            repository_commit=repository_commit,\n            current_commit=current_commit,\n            allow_stale=allow_stale,\n            source_name=source_name,\n        )\n\n    def remove_semantic_index(self, source_key: str) -> dict[str, Any]:\n        return self.semantic_indexes.remove(source_key)\n\n    def query(self, text: str, *, limit: int = 20) -> list[dict[str, Any]]:\n''',
                      "semantic index public API",
                  ),
                  (
                      '''        return {\n            "files": int(files),\n            "nodes": int(nodes),\n            "edges": int(edges),\n            "languages": languages,\n            "capabilities": capabilities,\n            "detectors": detectors,\n            "unknown_language_files": unknown,\n            "universal_text_fallback": True,\n        }\n''',
                      '''        return {\n            "files": int(files),\n            "nodes": int(nodes),\n            "edges": int(edges),\n            "languages": languages,\n            "capabilities": capabilities,\n            "detectors": detectors,\n            "unknown_language_files": unknown,\n            "universal_text_fallback": True,\n            **self.semantic_indexes.stats(),\n        }\n''',
                      "semantic index stats",
                  ),
              ),
          )
          PY

      - name: Validate semantic index import and ownership
        run: |
          python -m compileall -q syntavra_runtime/semantic_indexes.py syntavra_runtime/semantic_index_store.py syntavra_runtime/semantic_intelligence.py
          python -m unittest tests.runtime.test_semantic_indexes tests.runtime.test_semantic_index_store

      - name: Commit semantic index integration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/semantic_index_store.py syntavra_runtime/semantic_intelligence.py; then
            echo "No semantic index integration changes required."
            exit 0
          fi
          git config user.name "syntavra-semantic-bot"
          git config user.email "syntavra-semantic-bot@users.noreply.github.com"
          git add syntavra_runtime/semantic_index_store.py syntavra_runtime/semantic_intelligence.py
          git commit -m "integrate atomic LSIF and SCIP graph imports"
          git push origin "HEAD:${HEAD_BRANCH}"
