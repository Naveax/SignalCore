name: Diagnose Windows Roblox profile tests

on:
  push:
    branches:
      - fix/sovereign-runtime-materialized
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: diagnose-windows-roblox
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture test output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -m unittest discover -s tests/roblox_profile -v 2>&1 | Out-File -FilePath windows-roblox-diagnostic.txt -Encoding utf8
          "exit_code=$LASTEXITCODE" | Add-Content -Path windows-roblox-diagnostic.txt
          exit 0
      - name: Commit diagnostic
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add windows-roblox-diagnostic.txt
          git commit -m "diagnostic: record Windows Roblox test failure"
          git push origin HEAD:fix/sovereign-runtime-materialized
