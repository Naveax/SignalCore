name: Integrate adaptive context branch

on:
  push:
    branches: [agent/adaptive-context-v04]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Remove one-shot workflow before validation
        run: rm .github/workflows/adaptive-context-integration.yml
      - name: Compile and test
        run: |
          python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
          python -m unittest discover -s tests/runtime -q
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
          python -m unittest discover -s tests/roblox_profile -q
      - name: Run adaptive mixed-fixture benchmark
        run: |
          python benchmarks/adaptive_context_benchmark.py --output benchmarks/results/adaptive-context/internal-v1.json > adaptive-context-output.json
          python - <<'PY'
          import json
          from pathlib import Path
          result=json.loads(Path('benchmarks/results/adaptive-context/internal-v1.json').read_text())
          assert result['claim'] == 'SUPERIORITY_NOT_PROVEN'
          for profile in result['profiles']:
              aggregate=profile['aggregate']
              assert aggregate['all_quality_gates'] is True
              assert aggregate['all_roundtrips'] is True
              assert aggregate['all_search_queries_found'] is True
          PY
      - name: Regenerate release manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root=Path('.')
          generated={'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows=[]
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative=path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          root.joinpath('MANIFEST.sha256').write_text(''.join(f'{digest}  {name}\n' for name,digest in sorted(rows)), encoding='utf-8')
          PY
      - name: Run release validators
        run: |
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile 5x --smoke --output release-smoke.json
      - name: Commit verified integration artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize adaptive context integration and evidence'
          git push origin HEAD:agent/adaptive-context-v04
