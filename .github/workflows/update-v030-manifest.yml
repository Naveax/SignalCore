name: Update SignalCore v0.3 manifest binding

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/signalcore-v0.3.0-unified
      - name: Bind manifest to final runtime workflow
        shell: bash
        run: |
          set -euo pipefail
          actual=$(sha256sum .github/workflows/validate-fusion-runtime.yml | awk '{print $1}')
          test "$actual" = '0ecad43c62cd4e63309d5bb39d0b4fb87846708de3bc8c0b79c55f24c4452a33'
          python - <<'PY'
          from pathlib import Path
          path = Path('MANIFEST.sha256')
          text = path.read_text(encoding='utf-8')
          old = '3e121d5e1cb7136ea9424d0305868396f0c3ca969e38a8319c19e49c678e12a2  .github/workflows/validate-fusion-runtime.yml'
          new = '0ecad43c62cd4e63309d5bb39d0b4fb87846708de3bc8c0b79c55f24c4452a33  .github/workflows/validate-fusion-runtime.yml'
          if old not in text:
              if new in text:
                  raise SystemExit(0)
              raise SystemExit('expected manifest line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MANIFEST.sha256
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Bind manifest to SignalCore 0.3 runtime workflow'
          git push origin HEAD:agent/signalcore-v0.3.0-unified
