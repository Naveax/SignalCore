name: Fix SignalCore v0.3 materializer cleanup

on:
  push:
    branches: [agent/signalcore-v0.3.0-unified]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/signalcore-v0.3.0-unified
      - name: Make verified transfer cleanup force-safe
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/materialize-v030.yml')
          text = path.read_text(encoding='utf-8')
          old = 'git rm -r .signalcore-transfer-v030'
          new = 'git rm -r -f .signalcore-transfer-v030'
          if old not in text:
              raise SystemExit('expected materializer cleanup command not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/fix-v030-materializer-rm.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/materialize-v030.yml
          git commit -m 'Fix verified v0.3 transfer cleanup'
          git push origin HEAD:agent/signalcore-v0.3.0-unified
