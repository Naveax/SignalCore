name: Validate SignalCore v0.0.1 Pre-Release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  runtime-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check -e .
      - name: Compile ordinary source
        run: python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
      - name: Runtime tests
        run: python -m unittest discover -s tests/runtime -q
      - name: Existing adapter tests
        run: python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
      - name: Runtime package validation
        run: python tools/validate_runtime.py
      - name: Package integrity validation
        run: python tools/validate.py
      - name: Unified internal benchmark and fail-closed release smoke
        run: python tools/validate_release.py --profile 5x --smoke --output release-smoke.json
      - name: CLI unified-surface smoke
        shell: bash
        run: |
          python -m signalcore_runtime --project . version > version.json
          python -m signalcore_runtime --project . doctor > doctor.json
          python -m signalcore_runtime --project . install --all --dry-run > install.json
          python -m signalcore_runtime --project . integrations > integrations.json
          python -m signalcore_runtime --project . context-stress --max-tier 10000000 > context.json
          python -m signalcore_runtime --project . signalbench2 plan --repetitions 30 > signalbench2.json
          python -m signalcore_runtime --project . inspect stats > structural.json
          python -m signalcore_runtime --project . sandbox backends > sandbox.json
          python -m signalcore_runtime --project . output profiles > output.json
          python -m signalcore_runtime --project . signalbench validate --tasks benchmarks/signalbench/tasks.example.json --arms benchmarks/signalbench/arms.example.json > signalbench.json || true
          python - <<'PY'
          import json
          from pathlib import Path
          version=json.loads(Path('version.json').read_text())
          doctor=json.loads(Path('doctor.json').read_text())
          install=json.loads(Path('install.json').read_text())
          integrations=json.loads(Path('integrations.json').read_text())
          context=json.loads(Path('context.json').read_text())
          signalbench2=json.loads(Path('signalbench2.json').read_text())
          sandbox=json.loads(Path('sandbox.json').read_text())
          output=json.loads(Path('output.json').read_text())
          signalbench=json.loads(Path('signalbench.json').read_text())
          assert version['identity']['version'] == '0.0.1'
          assert version['identity']['channel'] == 'pre-release'
          assert doctor['runtime']['details']['version'] == '0.0.1'
          assert doctor['ok'] is True
          assert install['ok'] is True and install['dry_run'] is True
          assert integrations['coverage']['providers'] >= 10
          assert integrations['coverage']['frameworks'] >= 15
          assert integrations['coverage']['hosts'] >= 18
          assert context['ok'] is True and context['tiers'][-1]['tier_tokens'] == 10000000
          assert signalbench2['schedule']['runs'] == 27000
          assert 'local-restricted' in sandbox
          assert 'compact' in output['profiles']
          assert signalbench['ok'] is True
          PY

  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install wheel build backend
        run: python -m pip install --disable-pip-version-check 'setuptools>=69' wheel
      - name: Build wheel without network isolation
        run: python -m pip wheel --no-build-isolation . -w dist
      - name: Install wheel into clean environment
        shell: bash
        run: |
          python -m venv /tmp/signalcore-wheel
          /tmp/signalcore-wheel/bin/python -m pip install --no-index --find-links dist signalcore-runtime==0.0.1
          cd /tmp
          /tmp/signalcore-wheel/bin/signalcore version > version.json
          /tmp/signalcore-wheel/bin/python - <<'PY'
          import json
          from pathlib import Path
          from signalcore_runtime.cli import skill_root
          assert (skill_root() / 'SKILL.md').is_file()
          assert json.loads(Path('version.json').read_text())['identity']['version'] == '0.0.1'
          PY

  internal-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check -e .
      - name: Run v0.0.1 pre-release dominance benchmark
        run: python benchmarks/v001_pre_release_benchmark.py --output v001-pre-release.json
      - name: Run production-core component benchmark
        run: python benchmarks/v6_production_core_benchmark.py --output production-core.json
      - name: Run historical component benchmark
        run: python benchmarks/runtime_v03_benchmark.py --output runtime-component.json
      - uses: actions/upload-artifact@v4
        with:
          name: v001-pre-release-internal
          path: |
            v001-pre-release.json
            production-core.json
            runtime-component.json
          retention-days: 14

  profile-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Roblox profile tests
        run: python -m unittest discover -s tests/roblox_profile -q
      - name: Validate Roblox profile
        run: python tools/validate_roblox_profile.py
      - name: Verify governed Roblox claims
        run: python tools/verify_claims.py
