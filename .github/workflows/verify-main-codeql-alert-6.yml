name: Verify Main CodeQL Alert 6

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: read
  issues: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'fix/verify-main-codeql-alert-6'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      TARGET_SHA: ${{ github.event.pull_request.base.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Wait for main CodeQL and verify alert 6
        shell: python
        run: |
          from __future__ import annotations

          import json
          import os
          import time
          import urllib.request
          from pathlib import Path

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          target_sha = os.environ['TARGET_SHA']
          pr_number = os.environ['PR_NUMBER']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'syntavra-main-codeql-verifier',
          }

          def get_json(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          run = None
          for _ in range(90):
              payload = get_json(
                  f'https://api.github.com/repos/{repository}/actions/workflows/codeql.yml/runs'
                  f'?branch=main&event=push&per_page=30'
              )
              candidates = [item for item in payload.get('workflow_runs', []) if item.get('head_sha') == target_sha]
              if candidates:
                  run = sorted(candidates, key=lambda item: item.get('run_number', 0), reverse=True)[0]
                  if run.get('status') == 'completed':
                      break
              time.sleep(10)
          if not run or run.get('status') != 'completed':
              raise SystemExit(f'CodeQL push run for {target_sha} did not complete')
          if run.get('conclusion') != 'success':
              raise SystemExit(f'CodeQL push run failed: {run.get("html_url")} {run.get("conclusion")}')

          alert = get_json(f'https://api.github.com/repos/{repository}/code-scanning/alerts/6')
          open_alerts = get_json(
              f'https://api.github.com/repos/{repository}/code-scanning/alerts?state=open&per_page=100'
          )
          open_numbers = sorted(int(item['number']) for item in open_alerts)
          if alert.get('state') != 'fixed':
              raise SystemExit(f'Alert 6 is not fixed: {alert.get("state")}')
          if 6 in open_numbers:
              raise SystemExit('Alert 6 remains in the open alert set')

          rule = alert.get('rule') or {}
          instance = alert.get('most_recent_instance') or {}
          location = instance.get('location') or {}
          receipt = {
              'target_sha': target_sha,
              'codeql_run': {
                  'id': run.get('id'),
                  'run_number': run.get('run_number'),
                  'event': run.get('event'),
                  'status': run.get('status'),
                  'conclusion': run.get('conclusion'),
                  'html_url': run.get('html_url'),
              },
              'alert_6': {
                  'number': alert.get('number'),
                  'state': alert.get('state'),
                  'fixed_at': alert.get('fixed_at'),
                  'rule_id': rule.get('id'),
                  'security_severity_level': rule.get('security_severity_level'),
                  'path': location.get('path'),
                  'start_line': location.get('start_line'),
              },
              'open_alert_numbers': open_numbers,
          }
          Path('main-codeql-alert-6-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )

          body = (
              '### Main CodeQL alert #6 verification\n\n'
              f'- Main commit: `{target_sha}`\n'
              f'- CodeQL push run: `{run.get("conclusion")}` (run #{run.get("run_number")})\n'
              f'- Alert #6 state: `{alert.get("state")}`\n'
              f'- Open alert numbers: `{open_numbers}`\n'
          )
          request = urllib.request.Request(
              f'https://api.github.com/repos/{repository}/issues/{pr_number}/comments',
              data=json.dumps({'body': body}).encode('utf-8'),
              headers={**headers, 'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(request, timeout=30):
              pass

      - uses: actions/upload-artifact@v4
        with:
          name: syntavra-main-codeql-alert-6-receipt
          path: main-codeql-alert-6-receipt.json
          if-no-files-found: error
          retention-days: 7
