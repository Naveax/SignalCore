name: Integrate Verified Real Task Receipt

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: error::ResourceWarning
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  integrate-real-task:
    if: github.head_ref == 'agent/adaptive-context-v04'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Integrate receipt discovery
        run: python tools/integrate_real_task_receipt.py
      - name: Compile source
        run: python -m compileall -q signalcore_runtime tools tests benchmarks
      - name: Verify receipt unit tests
        run: python -m unittest tests.runtime.test_real_task_receipts -q
      - name: Inspect committed attrs receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from signalcore_runtime.real_task_receipts import load_verified_real_tasks
          result = load_verified_real_tasks(Path('benchmarks/results/real-tasks'))
          Path('/tmp/real-task-receipt-debug.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True),
              encoding='utf-8',
          )
          PY
      - name: Upload receipt diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-task-receipt-debug
          path: /tmp/real-task-receipt-debug.json
          if-no-files-found: error
      - name: Enforce committed attrs receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/real-task-receipt-debug.json').read_text())
          assert result['verified_count'] == 1, result
          assert result['rejected_count'] == 0, result
          task = result['verified'][0]
          assert task['repository'] == 'python-attrs/attrs'
          assert task['issue_number'] == 1245
          assert task['patched_tests'] == 31
          PY
      - name: Run Hardening V3 benchmark with real task
        run: |
          python benchmarks/hardening_v3_benchmark.py --output benchmarks/results/hardening-v3/internal.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('benchmarks/results/hardening-v3/internal.json').read_text())
          assert result['claim'] == 'SUPERIORITY_NOT_PROVEN'
          assert result['real_repository_tasks']['verified_count'] == 1
          assert result['real_repository_tasks']['rejected_count'] == 0
          assert result['readiness_gate']['evidence']['real_repository_tasks'] == 1
          assert 'real-task-corpus' in result['readiness_gate']['failed']
          assert result['readiness_gate']['ten_of_ten'] is False
          PY
      - name: Run complete runtime and profile suites
        run: |
          python -m unittest discover -s tests/runtime -q
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
          python -m unittest discover -s tests/roblox_profile -q
      - name: Remove one-shot integration machinery
        run: |
          rm .github/workflows/integrate-real-task-receipt.yml
          rm tools/integrate_real_task_receipt.py
      - name: Regenerate release manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          generated = {'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative = path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          root.joinpath('MANIFEST.sha256').write_text(
              ''.join(f'{digest}  {name}\n' for name, digest in sorted(rows)),
              encoding='utf-8',
          )
          PY
      - name: Run release validators
        run: |
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile 5x --smoke --output release-smoke.json
      - name: Commit verified real-task integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Integrate verified attrs real-task receipt'
          git push origin HEAD:agent/adaptive-context-v04
