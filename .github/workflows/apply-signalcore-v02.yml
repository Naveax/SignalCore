name: Apply verified SignalCore 0.2.0 source

on:
  push:
    branches: [feature/signalcore-v0.2-runtime]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"

jobs:
  apply:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'Implement SignalCore 0.2.0 runtime intelligence plane') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .signalcore-patch/part-*.xz > /tmp/signalcore-v02.patch.xz
          echo "8b198124d5eeddeae94609c40d29faab2f69d521a053460c673770bd55362466  /tmp/signalcore-v02.patch.xz" | sha256sum -c -
          xz -dc /tmp/signalcore-v02.patch.xz > /tmp/signalcore-v02.patch
          echo "20b826aa40532190558fa6a8e1dee260566252654e71c0379accef66a338cff7  /tmp/signalcore-v02.patch" | sha256sum -c -
          ! grep -E '^(diff --git a/|--- a/|\+\+\+ b/)(/|\.\./)' /tmp/signalcore-v02.patch
          git apply --check /tmp/signalcore-v02.patch
          git apply --index /tmp/signalcore-v02.patch
          rm -rf .signalcore-patch
          rm .github/workflows/apply-signalcore-v02.yml
      - name: Compile
        run: python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
      - name: Runtime tests
        run: python -m unittest discover -s tests/runtime -q
      - name: Adapter tests
        run: python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
      - name: Roblox profile tests
        run: python -m unittest discover -s tests/roblox_profile -q
      - name: Validators
        run: |
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile 5x --smoke --output fusion-release-smoke.json
      - name: Final tree assertions
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat VERSION)" = "0.2.0"
          test ! -e .signalcore-patch
          test ! -e .github/workflows/apply-signalcore-v02.yml
          ! find . -type f \( -name 'payload-*.b64' -o -name '*.patch.xz' \) -print -quit | grep .
      - name: Restore workflow paths for token-safe push
        shell: bash
        run: git restore --source=HEAD --staged --worktree .github/workflows
      - name: Commit and attempt push
        shell: bash
        run: |
          set +e
          {
            echo '=== STATUS BEFORE COMMIT ==='
            git status --short
            echo '=== HEAD ==='
            git log -1 --oneline --decorate
            echo '=== REMOTE FEATURE ==='
            git ls-remote origin refs/heads/feature/signalcore-v0.2-runtime
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            echo '=== COMMIT ==='
            git commit -m "Implement SignalCore 0.2.0 runtime intelligence plane"
            status=$?
            if [ "$status" -eq 0 ]; then
              echo '=== PUSH ==='
              git push origin HEAD:refs/heads/feature/signalcore-v0.2-runtime
              status=$?
            fi
            echo "FINAL_STATUS=$status"
            echo "$status" > /tmp/push-status
          } > /tmp/push-debug.log 2>&1
          cat /tmp/push-debug.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signalcore-push-debug
          path: /tmp/push-debug.log
          retention-days: 1
      - name: Enforce push result
        shell: bash
        run: test "$(cat /tmp/push-status)" = "0"
