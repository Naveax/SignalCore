name: Finalize Product V5 Platform Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONWARNINGS: 'error::ResourceWarning'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile product source
        run: python -m compileall -q signalcore_runtime tests benchmarks
      - name: Validate TypeScript distribution
        run: node --check sdk/typescript/dist/index.js
      - name: Run focused product tests
        run: python -m unittest tests.runtime.test_product_parity_v5 -v
      - name: Generate product benchmark
        run: python benchmarks/product_parity_v5_benchmark.py
      - name: Run complete test discovery
        run: python -m unittest discover -s tests -q
      - name: Generate canonical manifest without this one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          mv .github/workflows/product-v5-platform-diagnostics.yml /tmp/product-v5-platform-diagnostics.yml
          python - <<'PY'
          import hashlib
          from tools.validate import ROOT, _manifest_candidates

          rows = [
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.relative_to(ROOT).as_posix()}"
              for path in _manifest_candidates()
          ]
          (ROOT / "MANIFEST.sha256").write_text("\n".join(rows) + "\n", encoding="utf-8", newline="\n")
          PY
          python tools/validate.py
          mv /tmp/product-v5-platform-diagnostics.yml .github/workflows/product-v5-platform-diagnostics.yml
      - name: Commit benchmark and manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add MANIFEST.sha256 benchmarks/results/product-parity-v5/internal.json
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit -m 'Finalize product V5 cross-platform evidence'
            git push origin HEAD:${{ github.head_ref }}
          fi
