name: Syntavra LSP Semantic Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-lsp-semantic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Integrate LSP registry into semantic graph
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("syntavra_runtime/semantic_intelligence.py")
          source = path.read_text(encoding="utf-8")

          def one(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one anchor, found {count}")
              source = source.replace(old, new, 1)

          one(
              'from .language_services import LanguageServiceRegistry, SandboxedLanguageServiceAdapter\n',
              'from .language_services import LanguageServiceRegistry, SandboxedLanguageServiceAdapter\nfrom .language_lsp import GenericLSPAdapter, LSPServiceRegistry\n',
              "lsp import",
          )
          one(
              '''        language_registry: LanguageRegistry | None = None,\n        language_service_registry: LanguageServiceRegistry | None = None,\n    ):\n        self.path = path\n        self.languages = language_registry or LanguageRegistry()\n        self.language_services = language_service_registry or LanguageServiceRegistry()\n''',
              '''        language_registry: LanguageRegistry | None = None,\n        language_service_registry: LanguageServiceRegistry | None = None,\n        lsp_service_registry: LSPServiceRegistry | None = None,\n    ):\n        self.path = path\n        self.languages = language_registry or LanguageRegistry()\n        self.language_services = language_service_registry or LanguageServiceRegistry()\n        self.lsp_services = lsp_service_registry or LSPServiceRegistry()\n''',
              "lsp registry",
          )
          one(
              '''        self.language_services.discover(root)\n        service_diagnostics: list[str] = list(self.language_services.diagnostics)\n        if os.environ.get("SYNTAVRA_ALLOW_LANGUAGE_SERVICES", "").casefold() in {"1", "true", "yes"}:\n            for manifest in sorted(self.language_services.manifests.values(), key=lambda item: item.service_id):\n                try:\n                    adapter = SandboxedLanguageServiceAdapter(\n                        manifest,\n                        workspace=root,\n                        state_root=self.path.parent / "language-service-state",\n                    )\n                    self.languages.register_adapter(adapter)\n                except Exception as error:\n                    service_diagnostics.append(f"service:{manifest.service_id}: {type(error).__name__}: {error}")\n        changed = 0\n''',
              '''        self.language_services.discover(root)\n        self.lsp_services.discover(root)\n        service_diagnostics: list[str] = list(self.language_services.diagnostics)\n        lsp_diagnostics: list[str] = list(self.lsp_services.diagnostics)\n        if os.environ.get("SYNTAVRA_ALLOW_LANGUAGE_SERVICES", "").casefold() in {"1", "true", "yes"}:\n            for manifest in sorted(self.language_services.manifests.values(), key=lambda item: item.service_id):\n                try:\n                    adapter = SandboxedLanguageServiceAdapter(\n                        manifest,\n                        workspace=root,\n                        state_root=self.path.parent / "language-service-state",\n                    )\n                    self.languages.register_adapter(adapter)\n                except Exception as error:\n                    service_diagnostics.append(f"service:{manifest.service_id}: {type(error).__name__}: {error}")\n        if os.environ.get("SYNTAVRA_ALLOW_LSP_SERVICES", "").casefold() in {"1", "true", "yes"}:\n            for manifest in sorted(self.lsp_services.manifests.values(), key=lambda item: item.service_id):\n                occupied = [language for language in manifest.language_ids if self.languages.adapter_for(language) is not None]\n                if occupied:\n                    lsp_diagnostics.append(f"lsp:{manifest.service_id}: shadowed-by-higher-priority-adapter:{','.join(sorted(occupied))}")\n                    continue\n                try:\n                    adapter = GenericLSPAdapter(\n                        manifest,\n                        workspace=root,\n                        state_root=self.path.parent / "lsp-service-state",\n                    )\n                    self.languages.register_adapter(adapter)\n                except Exception as error:\n                    lsp_diagnostics.append(f"lsp:{manifest.service_id}: {type(error).__name__}: {error}")\n        changed = 0\n''',
              "lsp discovery",
          )
          one(
              '''            "language_services": {\n                **self.language_services.inventory(),\n                "diagnostics": service_diagnostics,\n            },\n            **self.stats(),\n''',
              '''            "language_services": {\n                **self.language_services.inventory(),\n                "diagnostics": service_diagnostics,\n            },\n            "lsp_services": {\n                **self.lsp_services.inventory(),\n                "diagnostics": lsp_diagnostics,\n            },\n            **self.stats(),\n''',
              "lsp inventory",
          )
          path.write_text(source, encoding="utf-8")
          PY

      - name: Validate LSP bridge and semantic tests
        run: |
          python -m compileall -q syntavra_runtime/lsp_worker.py syntavra_runtime/language_lsp.py syntavra_runtime/semantic_intelligence.py
          python -m unittest tests.runtime.test_language_lsp tests.runtime.test_language_platform tests.runtime.test_language_services

      - name: Commit LSP semantic integration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/semantic_intelligence.py; then
            echo "No LSP integration changes required."
            exit 0
          fi
          git config user.name "syntavra-language-bot"
          git config user.email "syntavra-language-bot@users.noreply.github.com"
          git add syntavra_runtime/semantic_intelligence.py
          git commit -m "integrate generic LSP semantic services"
          git push origin "HEAD:${HEAD_BRANCH}"
