name: Publish Syntavra 0.0.1 Pre-Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm and PyPI after all validation succeeds
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: syntavra-0.0.1-pre-release-publish
  cancel-in-progress: false

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.identity.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/typescript/package-lock.json
      - name: Validate locked identity
        id: identity
        shell: bash
        run: |
          python - <<'PY'
          import json, pathlib, tomllib
          py = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          npm = json.loads(pathlib.Path('package.json').read_text())
          assert py['project']['version'] == '0.0.1'
          assert npm['version'] == '0.0.1'
          assert npm['publishConfig']['tag'] == 'next'
          print('version=0.0.1')
          PY
          echo 'version=0.0.1' >> "$GITHUB_OUTPUT"
      - name: Install validation dependencies
        run: python -m pip install --upgrade pip build pytest
      - name: Validate repository and runtime
        run: |
          python -m tools.refresh_manifest --check
          python -m tools.validate
          python -m tools.validate_runtime
          python -m tools.validate_release
          python -m pytest -q
      - name: Validate npm installer
        run: |
          npm ci
          npm test
          npm run pack:check
      - name: Validate TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run check
          npm test
          npm pack --dry-run --json
      - name: Build Python distributions
        run: python -m build
      - name: Build npm packages
        run: |
          npm pack --json > npm-pack.json
          cd sdk/typescript
          npm pack --pack-destination ../.. --json > ../../sdk-npm-pack.json
      - name: Upload publication candidates
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-0.0.1-publication-candidates
          retention-days: 30
          if-no-files-found: error
          path: |
            dist/*
            syntavra-install-0.0.1.tgz
            syntavra-sdk-0.0.1.tgz
            npm-pack.json
            sdk-npm-pack.json
            MANIFEST.sha256

  publish-pypi:
    if: ${{ inputs.publish }}
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment: pre-release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: syntavra-0.0.1-publication-candidates
          path: publication
      - name: Restore Python distributions
        run: |
          mkdir -p dist
          cp publication/dist/* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false

  publish-npm:
    if: ${{ inputs.publish }}
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment: pre-release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Publish installer
        run: npm publish --tag next --provenance --access public
      - name: Publish TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm publish --tag next --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
