name: Finalize SignalCore 0.2 Windows integrity

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signalcore-v02-finalize-windows
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/signalcore-v0.2-runtime'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/signalcore-v0.2-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Update manifest and remove temporary workflows
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Get-Content -Raw -LiteralPath 'MANIFEST.sha256'
          $old = 'c68e70303f605ff4fa5fa4671b0ac4c88c95cdf60aade383452dc7238a0f521a  .gitattributes'
          $new = 'c0f3a6e69b7e180b9e562727e99f3670e2dbaaa15338a6d9a39506275616baff  .gitattributes'
          if (-not $manifest.Contains($old)) { throw 'Expected .gitattributes manifest entry not found' }
          $manifest = $manifest.Replace($old, $new)
          [System.IO.File]::WriteAllText((Resolve-Path 'MANIFEST.sha256'), $manifest, [System.Text.UTF8Encoding]::new($false))
          Remove-Item -LiteralPath '.github/workflows/windows-validator-diagnostic.yml' -Force
          Remove-Item -LiteralPath '.github/workflows/finalize-windows-line-endings.yml' -Force
      - name: Validate exact Windows checkout
        shell: pwsh
        run: |
          python tools/validate.py
          python tools/validate_runtime.py
          python -m unittest discover -s tests/runtime -q
      - name: Commit final ordinary source
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix cross-platform release manifest integrity'
          git push origin HEAD:feature/signalcore-v0.2-runtime
