name: Diagnose Provider Proxy V4B

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/diagnose-provider-proxy-v4b.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run isolated proxy tests
        run: |
          set +e
          timeout 180s python -m unittest tests.runtime.test_provider_proxy_v4 -v > provider-proxy-v4-diagnostic.txt 2>&1
          status=$?
          echo "EXIT_STATUS=$status" >> provider-proxy-v4-diagnostic.txt
          cat provider-proxy-v4-diagnostic.txt
          exit 0
      - name: Commit diagnostic log
        run: |
          rm .github/workflows/diagnose-provider-proxy-v4b.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "record provider proxy v4 diagnostic output"
          git push origin HEAD:agent/adaptive-context-v04
