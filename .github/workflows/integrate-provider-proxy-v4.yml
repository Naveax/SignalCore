name: Integrate Provider Proxy V4

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/integrate-provider-proxy-v4.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - name: Harden proxy resources and expose CLI server
        run: |
          python - <<'PY'
          from pathlib import Path

          proxy = Path('signalcore_runtime/provider_proxy.py')
          text = proxy.read_text(encoding='utf-8')
          buffer_anchor = '                body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                if len(body) > runtime.config.max_buffered_response_bytes:\n'
          if 'body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                response.close()\n' not in text:
              if buffer_anchor not in text:
                  raise SystemExit('buffer response anchor missing')
              text = text.replace(
                  buffer_anchor,
                  '                body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                response.close()\n                if len(body) > runtime.config.max_buffered_response_bytes:\n',
                  1,
              )
          stream_anchor = '                        self.wfile.flush()\n                    spool.seek(0)\n'
          if '                        self.wfile.flush()\n                    response.close()\n                    spool.seek(0)\n' not in text:
              if stream_anchor not in text:
                  raise SystemExit('stream response anchor missing')
              text = text.replace(
                  stream_anchor,
                  '                        self.wfile.flush()\n                    response.close()\n                    spool.seek(0)\n',
                  1,
              )
          get_anchor = '                    body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                    if len(body) > runtime.config.max_buffered_response_bytes:\n'
          if 'body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                    response.close()\n' not in text:
              if get_anchor not in text:
                  raise SystemExit('GET response anchor missing')
              text = text.replace(
                  get_anchor,
                  '                    body = response.read(runtime.config.max_buffered_response_bytes + 1)\n                    response.close()\n                    if len(body) > runtime.config.max_buffered_response_bytes:\n',
                  1,
              )
          shutdown_anchor = '''    def shutdown(self) -> None:
        server = self._server
'''
          wait_method = '''    def wait(self) -> None:
        thread = self._thread
        if thread is None:
            raise RuntimeError("proxy is not running in background mode")
        try:
            while thread.is_alive():
                thread.join(timeout=1.0)
        except KeyboardInterrupt:
            self.shutdown()

'''
          if '    def wait(self) -> None:\n' not in text:
              if shutdown_anchor not in text:
                  raise SystemExit('proxy wait anchor missing')
              text = text.replace(shutdown_anchor, wait_method + shutdown_anchor, 1)
          proxy.write_text(text, encoding='utf-8')

          cli = Path('signalcore_runtime/competitive_cli.py')
          text = cli.read_text(encoding='utf-8')
          import_anchor = 'from .provider_gateway import ProviderGateway, ProviderPlan\n'
          import_line = 'from .provider_proxy import ProviderProxyRuntime, ProxyConfig\n'
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('proxy CLI import anchor missing')
              text = text.replace(import_anchor, import_anchor + import_line, 1)
          handler_anchor = '''    elif args.provider_action == "stats":
        result = gateway.stats()
'''
          proxy_handler = '''    elif args.provider_action == "proxy":
        config = ProxyConfig(
            provider=args.provider,
            upstream_base=args.upstream,
            listen_host=args.listen_host,
            listen_port=args.listen_port,
            credential_env=args.credential_env,
            credential_header=args.credential_header,
            credential_prefix=args.credential_prefix,
            control_token_env=args.control_token_env,
            allow_remote=args.allow_remote,
            allow_insecure_upstream=args.allow_insecure_upstream,
            cache_policy=args.cache_policy,
            replay_ttl_seconds=args.replay_ttl_seconds,
            prompt_cache_ttl_seconds=args.prompt_cache_ttl_seconds,
            timeout_seconds=args.timeout_seconds,
            max_request_bytes=args.max_request_bytes,
            max_buffered_response_bytes=args.max_response_bytes,
        )
        config.validate()
        if args.dry_run:
            result = {"ok": True, "config": asdict(config)}
        else:
            if args.output:
                raise ValueError("--output is supported only with --dry-run for a long-running proxy")
            runtime = ProviderProxyRuntime(
                config,
                gateway=gateway,
                insight_path=_state_root(args) / "provider-proxy-insights.sqlite3",
            )
            host, port = runtime.start()
            _emit({
                "event": "PROVIDER_PROXY_READY",
                "provider": ProviderGateway.capabilities(args.provider)["provider"],
                "listen": {"host": host, "port": port},
                "upstream_origin_hash": runtime.status()["upstream_origin_hash"],
                "cache_policy": args.cache_policy,
            })
            sys.stdout.flush()
            runtime.wait()
            return 0
    elif args.provider_action == "stats":
        result = gateway.stats()
'''
          if 'elif args.provider_action == "proxy":' not in text:
              if handler_anchor not in text:
                  raise SystemExit('proxy CLI handler anchor missing')
              text = text.replace(handler_anchor, proxy_handler, 1)
          parser_anchor = '''    stats = ps.add_parser("stats")
    stats.add_argument("--output")
'''
          proxy_parser = '''    proxy = ps.add_parser("proxy", help="Run a credential-isolated fixed-origin provider reverse proxy")
    proxy.add_argument("--provider", required=True)
    proxy.add_argument("--upstream", required=True)
    proxy.add_argument("--listen-host", default="127.0.0.1")
    proxy.add_argument("--listen-port", type=int, default=8787)
    proxy.add_argument("--credential-env", default="")
    proxy.add_argument("--credential-header", default="")
    proxy.add_argument("--credential-prefix", default="")
    proxy.add_argument("--control-token-env", default="SIGNALCORE_PROXY_CONTROL_TOKEN")
    proxy.add_argument("--allow-remote", action="store_true")
    proxy.add_argument("--allow-insecure-upstream", action="store_true")
    proxy.add_argument("--cache-policy", choices=("off", "auto", "read", "read-write"), default="auto")
    proxy.add_argument("--replay-ttl-seconds", type=int, default=900)
    proxy.add_argument("--prompt-cache-ttl-seconds", type=int, default=300)
    proxy.add_argument("--timeout-seconds", type=float, default=180)
    proxy.add_argument("--max-request-bytes", type=int, default=16 * 1024 * 1024)
    proxy.add_argument("--max-response-bytes", type=int, default=64 * 1024 * 1024)
    proxy.add_argument("--dry-run", action="store_true")
    proxy.add_argument("--output")

    stats = ps.add_parser("stats")
    stats.add_argument("--output")
'''
          if 'ps.add_parser("proxy"' not in text:
              if parser_anchor not in text:
                  raise SystemExit('proxy CLI parser anchor missing')
              text = text.replace(parser_anchor, proxy_parser, 1)
          cli.write_text(text, encoding='utf-8')
          Path('.github/workflows/integrate-provider-proxy-v4.yml').unlink()
          PY
      - name: Regenerate exact manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          generated = {'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              relative = path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts):
                  continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc':
                  continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          Path('MANIFEST.sha256').write_text(
              ''.join(f'{digest}  {name}\n' for name, digest in sorted(rows)), encoding='utf-8'
          )
          PY
      - name: Validate proxy, CLI, and complete runtime
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONWARNINGS: "error::ResourceWarning"
        run: |
          python -m py_compile signalcore_runtime/provider_proxy.py signalcore_runtime/competitive_cli.py
          python -m unittest tests.runtime.test_provider_proxy_v4 -v
          python -m unittest tests.runtime.test_provider_proxy_cli_v4 -v
          python -m unittest tests.runtime.test_competitive_cli_v4 -v
          python -m unittest tests.runtime.test_provider_gateway_v4 -v
          python -m unittest discover -s tests/runtime -p 'test_*.py' -v
          python tools/validate_runtime.py
          python tools/validate.py
      - name: Commit proxy integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "add transparent provider proxy v4"
          git push origin HEAD:agent/adaptive-context-v04
