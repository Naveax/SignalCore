name: Repository Hardening

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer:
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install locked installer dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Test installer
        run: npm test
      - name: Verify installer command and package
        run: |
          node install/index.mjs --help
          npm pack --dry-run --json > installer-pack.json
      - name: Verify installer identity
        run: |
          node -e "const p=require('./package.json'); if(p.name!=='@signalcore/install'||p.version!=='0.0.1') process.exit(1)"
          node -e "const p=require('./package-lock.json'); if(p.version!=='0.0.1') process.exit(1)"

  typescript-sdk:
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install locked SDK dependencies
        working-directory: sdk/typescript
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Type-check SDK
        working-directory: sdk/typescript
        run: npm run check
      - name: Build SDK
        id: sdk-build
        continue-on-error: true
        working-directory: sdk/typescript
        run: npm run build > build.log 2>&1
      - name: Upload SDK build diagnostics
        if: steps.sdk-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typescript-build-${{ matrix.node }}
          path: sdk/typescript/build.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce SDK build success
        if: steps.sdk-build.outcome == 'failure'
        working-directory: sdk/typescript
        run: |
          cat build.log
          exit 1
      - name: Test receipt validation
        working-directory: sdk/typescript
        run: node --test test/receipts.test.mjs
      - name: Test proxy client
        working-directory: sdk/typescript
        run: node --test test/client.test.mjs
      - name: Inspect SDK package
        working-directory: sdk/typescript
        run: npm pack --dry-run --json > npm-pack-dry-run.json
      - name: Verify distributable SDK
        working-directory: sdk/typescript
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/receipts.js
          test -f dist/receipts.d.ts
          node -e "const p=require('./package.json'); if(p.version!=='0.0.1') process.exit(1)"

  repository-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Repository hygiene
        run: python tools/check_repository_hygiene.py
      - name: Locked product identity
        run: python tools/v6_materialize.py
      - name: Manifest
        run: python tools/refresh_manifest.py --check
