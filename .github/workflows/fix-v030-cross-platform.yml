name: Fix SignalCore v0.3 cross-platform runtime

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/signalcore-v0.3.0-unified
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply macOS-safe local sandbox limits and manifest bindings
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('signalcore_runtime/sandbox.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('import shutil\nimport subprocess\n', 'import shutil\nimport subprocess\nimport sys\n', 1)
          text = text.replace(
              '"resource_limited": backend in {"docker", "podman", "bwrap"} or os.name != "nt",',
              '"resource_limited": backend in {"docker", "podman", "bwrap"} or (os.name != "nt" and sys.platform != "darwin"),',
              1,
          )
          old = '''                    def limit_resources() -> None:\n                        resource.setrlimit(resource.RLIMIT_CPU, (max(1, int(policy.timeout_seconds)), max(1, int(policy.timeout_seconds) + 1)))\n                        bytes_limit = policy.memory_mb * 1024 * 1024\n                        resource.setrlimit(resource.RLIMIT_AS, (bytes_limit, bytes_limit))\n                        # RLIMIT_NPROC is user-wide on common Unix systems and\n                        # can make a child fail during interpreter startup when\n                        # the runner already owns many processes. Process-tree\n                        # cleanup remains enforced; strict PID isolation belongs\n                        # to container/bwrap backends.\n\n                    preexec = limit_resources\n'''
          new = '''                    def limit_resources() -> None:\n                        # Never allow a platform-specific rlimit failure to abort\n                        # process creation from preexec_fn. macOS rejects\n                        # RLIMIT_AS for common interpreter launches; Linux accepts\n                        # it. CPU limits remain best-effort on all POSIX hosts.\n                        cpu_limit = max(1, int(policy.timeout_seconds))\n                        try:\n                            resource.setrlimit(resource.RLIMIT_CPU, (cpu_limit, cpu_limit + 1))\n                        except (OSError, ValueError):\n                            pass\n                        if sys.platform != "darwin" and hasattr(resource, "RLIMIT_AS"):\n                            bytes_limit = policy.memory_mb * 1024 * 1024\n                            try:\n                                resource.setrlimit(resource.RLIMIT_AS, (bytes_limit, bytes_limit))\n                            except (OSError, ValueError):\n                                pass\n                        # RLIMIT_NPROC is user-wide on common Unix systems and\n                        # can make a child fail during interpreter startup when\n                        # the runner already owns many processes. Process-tree\n                        # cleanup remains enforced; strict PID isolation belongs\n                        # to container/bwrap backends.\n\n                    preexec = limit_resources\n'''
          if old not in text:
              raise SystemExit('sandbox rlimit block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          manifest = Path('MANIFEST.sha256')
          value = manifest.read_text(encoding='utf-8')
          replacements = {
              '0ecad43c62cd4e63309d5bb39d0b4fb87846708de3bc8c0b79c55f24c4452a33  .github/workflows/validate-fusion-runtime.yml':
              '41e4016860ed6507659a9863d648a1636912e12aa28e1ae6201370538c0ff30b  .github/workflows/validate-fusion-runtime.yml',
              'a7b066405acf2dabd2450231cd1f3827b450a59c1baf41ae977496ed856210b9  signalcore_runtime/sandbox.py':
              'b93cdd7ddd005271e5099c77a2aaea551da3919257cb86e8cc7730764482a068  signalcore_runtime/sandbox.py',
          }
          for before, after in replacements.items():
              if before not in value:
                  raise SystemExit(f'manifest binding not found: {before}')
              value = value.replace(before, after, 1)
          manifest.write_text(value, encoding='utf-8')
          PY
          test "$(sha256sum signalcore_runtime/sandbox.py | awk '{print $1}')" = 'b93cdd7ddd005271e5099c77a2aaea551da3919257cb86e8cc7730764482a068'
          test "$(sha256sum .github/workflows/validate-fusion-runtime.yml | awk '{print $1}')" = '41e4016860ed6507659a9863d648a1636912e12aa28e1ae6201370538c0ff30b'
          python -m unittest discover -s tests/runtime -q
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add signalcore_runtime/sandbox.py MANIFEST.sha256
          git diff --cached --check
          git commit -m 'Fix SignalCore 0.3 cross-platform runtime'
          git push origin HEAD:agent/signalcore-v0.3.0-unified
