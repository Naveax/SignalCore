name: Materialize SignalCore Fusion Runtime Patch V2

on:
  pull_request:
    branches:
      - feat/5x-fusion-runtime
    paths:
      - ".fusion-patch-v2/**"
      - ".github/fusion-patch-v2-trigger.txt"

permissions:
  contents: write

concurrency:
  group: materialize-signalcore-fusion-runtime-patch-v2
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify reviewable source patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .fusion-patch-v2 -maxdepth 1 -name 'patch-*.diff' -type f | wc -l)" -eq 31
          cat .fusion-patch-v2/patch-*.diff > /tmp/fusion-source.patch
          echo "fa363d609fad8880ee63c993be01a04097ddd9449e57b1018e7511ea253010a3  /tmp/fusion-source.patch" | sha256sum -c -
          if grep -E 'payload-.*\.b64|\.signalcore-direct|\.materialize' /tmp/fusion-source.patch; then
            echo "forbidden encoded source transport" >&2
            exit 2
          fi
          git rm -f .github/workflows/validate-fusion-runtime.yml
          git apply --check /tmp/fusion-source.patch

      - name: Apply ordinary source and remove transfer infrastructure
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/fusion-source.patch
          rm -rf .fusion-patch-v2 .fusion-patch .fusion-materialize .fusion-transfer
          rm -f .github/fusion-patch-v2-trigger.txt .github/fusion-patch-trigger.txt .github/fusion-transfer-trigger.txt
          rm -f .github/workflows/materialize-fusion-source.yml
          rm -f .github/workflows/materialize-fusion-source-plaintext.yml
          rm -f .github/workflows/materialize-fusion-patch.yml
          rm -f .github/workflows/materialize-fusion-patch-v2.yml
          git diff --check

      - name: Validate source before identity commit
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
          python -m unittest discover -s tests/runtime -q
          python -m unittest discover -s tests/roblox_profile -q
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q

      - name: Commit immutable source snapshot
        id: source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement SignalCore 5X Fusion runtime control plane"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate evidence, claim ceilings, and manifests
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          python tools/generate_fusion_evidence.py --source-commit "$SOURCE_SHA"
          python benchmarks/roblox_profile_benchmark.py --cases 50 --mode simulated --source-commit "$SOURCE_SHA" --output benchmarks/results/roblox-profile/simulated-50.json
          python tools/generate_manifests.py

      - name: Run final release validation
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
          python -m unittest discover -s tests/runtime -q
          python -m unittest discover -s tests/roblox_profile -q
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile runtime --smoke --output /tmp/runtime-release.json
          python tools/validate_release.py --profile 5x --smoke --output /tmp/5x-smoke.json
          python - <<'PY'
          import json
          report=json.load(open('/tmp/5x-smoke.json',encoding='utf-8'))
          assert report['release_gate_pass'] is False
          assert report['maximum_allowed_claim'] == '5X_NOT_PROVEN'
          PY
          set +e
          python tools/validate_release.py --profile 5x --output /tmp/5x-strict.json
          code=$?
          set -e
          test "$code" -eq 3
          git diff --check

      - name: Commit evidence-bound release artifacts
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "Bind Fusion runtime evidence and claim ceilings"

      - name: Push ordinary source branch and remove temporary branches
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:feat/5x-fusion-runtime
          for branch in "${{ github.event.pull_request.head.ref }}" transfer/5x-fusion-source transfer/5x-fusion-plaintext transfer/5x-fusion-patch; do
            git push origin --delete "$branch" || true
          done
